# Example: overriding the subnetwork for nodes provisioned by Karpenter.
#
# By default nodes are placed in the cluster's default subnetwork (inherited
# from the bootstrap pool). Use networkConfig.networkInterfaces[0].subnetwork to
# place Karpenter nodes in a different subnetwork — for example a dedicated
# subnetwork with a smaller CIDR or different firewall rules.
#
# The subnetwork value must be a self-link or partial URL in the form:
#   regions/REGION/subnetworks/SUBNETWORK_NAME
# or the full self-link:
#   https://www.googleapis.com/compute/v1/projects/PROJECT/regions/REGION/subnetworks/NAME
#
# Reference:
#   https://cloud.google.com/compute/docs/reference/rest/v1/instances#networkinterface
apiVersion: karpenter.k8s.gcp/v1alpha1
kind: GCENodeClass
metadata:
  name: subnetwork-override-example
spec:
  imageSelectorTerms:
    - alias: ContainerOptimizedOS@latest
  networkConfig:
    networkInterfaces:
      - subnetwork: regions/us-central1/subnetworks/karpenter-nodes
  disks:
    - category: pd-balanced
      sizeGiB: 60
      boot: true
