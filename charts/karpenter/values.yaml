nameOverride: "" # Override the default name, empty means no override
fullnameOverride: "" # Override the full name, empty means no override

# -- Global log level, defaults to 'info'
logLevel: info
# -- Log outputPaths - defaults to stdout only
logOutputPaths:
  - stdout
# -- Log errorOutputPaths - defaults to stderr only
logErrorOutputPaths:
  - stderr

# -- Additional annotations to add into metadata.
additionalAnnotations: {} # Empty dictionary for extra annotations

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

# -- Security context applied at the pod level.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Security context applied to the karpenter container.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

imagePullSecrets: []
#  - name: my-registry-secret

podDisruptionBudget:
  minAvailable: 1

serviceMonitor:
  # -- Specifies whether a ServiceMonitor should be created.
  enabled: false
  # -- Additional labels for the ServiceMonitor.
  additionalLabels: {}
  # -- Scrape interval for the `http-metrics` endpoint. Empty string uses the Prometheus operator's default (typically 30s).
  interval: ""
  # -- Scrape timeout for the `http-metrics` endpoint. Empty string uses the Prometheus operator's default (typically 10s).
  scrapeTimeout: ""
  # -- Relabelings for the `http-metrics` endpoint on the ServiceMonitor.
  # For more details on relabelings, see: https://prometheus.io/docs/prometheus/latest/configuration/configuration/#relabel_config
  relabelings: []
  # -- Metric relabelings for the `http-metrics` endpoint on the ServiceMonitor.
  # For more details on metric relabelings, see: https://prometheus.io/docs/prometheus/latest/configuration/configuration/#metric_relabel_configs
  metricRelabelings: []
  # -- Specifies the sampleLimit for prometheus scrapes.
  # Per-scrape limit on the number of scraped samples that will be accepted.
  # If more than this number of samples are present after metric relabeling
  # the entire scrape will be treated as failed. 0 means no limit.
  sampleLimit: null

controller:
  replicaCount: 2
  revisionHistoryLimit: 10
  strategy:
    rollingUpdate:
      maxUnavailable: 1
  image:
    repository: "public.ecr.aws/cloudpilotai/gcp/karpenter"
    # Overrides the chart's appVersion if set (defaults to `.Chart.AppVersion`)
    tag: ""
    pullPolicy: IfNotPresent
  priorityClassName: gmp-critical
  terminationGracePeriodSeconds: 30
  env: []
  resources:
    requests:
      cpu: 500m
      memory: 500Mi
  metrics:
    port: 8080
  healthProbe:
    port: 8081
  featureGates:
    # Enable this will enable spot replacement consolidation for both single and multi-node consolidation.
    spotToSpotConsolidation: true
    # -- nodeOverlay is ALPHA and is disabled by default.
    # Setting this will allow the use of node overlay to impact scheduling decisions
    nodeOverlay: false
    # -- staticCapacity is ALPHA and is disabled by default.
    # When enabled, a NodePool with spec.replicas set maintains a fixed number of nodes
    # regardless of pod demand (static node pool). consolidationPolicy and consolidateAfter
    # are ignored on static NodePools.
    staticCapacity: false
    # -- nodeRepair is ALPHA and is disabled by default.
    # When enabled, Karpenter replaces nodes that fail GKE Node Problem Detector health conditions.
    nodeRepair: false
    # -- reservedCapacity enables scheduling to reserved/committed GCP capacity.
    # Disabled: the GCP provider does not yet implement GCE reservation support (#239).
    reservedCapacity: false
  # -- disableControllerWarmup controls whether controller sources (watches/informers) start
  # before leader election is won. Set to false to enable warmup, which pre-populates caches
  # and improves leader failover time. Default true matches karpenter-core default (warmup disabled).
  disableControllerWarmup: true
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: karpenter
          topologyKey: kubernetes.io/hostname
  tolerations: []
  settings:
    # -- The GCP project ID.
    projectID: ""
    # -- The GCP region for instance type discovery (e.g., us-central1)
    clusterLocation: ""
    # -- The exact GCP cluster location for GKE API calls (e.g., us-central1-a for zonal, us-central1 for regional).
    # If not set, defaults to 'clusterLocation' for backward compatibility.
    nodeLocation: ""
    # -- The GCP cluster name.
    clusterName: ""
    # -- The VM memory overhead as a percent that will be subtracted from the total memory for all instance types. The value of `0.075` equals to 7.5%.
    vmMemoryOverheadPercent: 0.065
    # -- The maximum length of a batch window. The longer this is, the more pods we can consider for provisioning at one
    # time which usually results in fewer but larger nodes.
    batchMaxDuration: 10s
    # -- The maximum amount of time with no new ending pods that if exceeded ends the current batching window. If pods arrive
    # faster than this time, the batching window will be extended up to the maxDuration. If they arrive slower, the pods
    # will be batched separately.
    batchIdleDuration: 1s
    # -- ignoreDRARequests controls whether Karpenter ignores pods' Dynamic Resource Allocation requests during scheduling simulations.
    # Keep true unless the cluster has DRA drivers and resource claims that Karpenter should account for.
    ignoreDRARequests: true
    # -- Pin the GKE node pool used as the bootstrap metadata source. When set, Karpenter uses this pool
    # exclusively and returns an error if it is not RUNNING. Leave empty to use automatic discovery
    # (default-pool → first alphabetical RUNNING pool → fallback karpenter-fallback creation).
    defaultNodePoolTemplateName: ""
    # -- Default GCP service account email to attach to provisioned nodes. When set, overrides the
    # Compute Engine default SA. Corresponds to the DEFAULT_NODEPOOL_SERVICE_ACCOUNT env var.
    # Recommended: set to a dedicated SA with roles/container.nodeServiceAccount.
    # Can be overridden per-NodeClass via GCENodeClass.spec.serviceAccount.
    defaultNodepoolServiceAccount: ""

# -- GCP credentials configuration
credentials:
  # -- Enable or disable the use of GCP credentials secret
  # Set to true if you want to use a Kubernetes secret for GCP authentication
  # Set to false to rely on other authentication methods (e.g., Workload Identity, instance metadata)
  enabled: true
  # -- Name of the existing secret containing GCP credentials
  # If not specified, defaults to "<release-name>-gcp-credentials"
  # This secret should contain a service account key file
  secretName: ""
  # -- Key within the secret that contains the service account JSON
  secretKey: "key.json"
