<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>唱唱学英语 · Sing & Learn</title>
  <meta name="description" content="一个可爱卡通风格的儿童英语儿歌 App,中英双语跟唱学习。" />

  <!-- 圆润可爱字体(需联网;离线会自动回退到系统圆体) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
  <link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>"
  />
</head>
<body>
  <!-- 飘动的云朵装饰 -->
  <div class="cloud c1">☁️</div>
  <div class="cloud c2">☁️</div>
  <div class="cloud c3">🎈</div>

  <main class="app">
    <!-- ============ 首页 ============ -->
    <section id="home-view" class="home-view">
      <header class="hero">
        <div class="mascot">🐻</div>
        <h1>唱唱学英语</h1>
        <p>Sing &amp; Learn · 跟着儿歌一起开口说英语 🎶</p>
      </header>
      <div id="grid" class="grid"><!-- 歌曲卡片由 JS 渲染 --></div>
      <p class="hint" id="hint">👆 点一首歌,按下「开始唱」就会一句一句念给你听</p>
    </section>

    <!-- ============ 歌曲详情页 ============ -->
    <section id="song-view" class="song-view">
      <div class="song-header">
        <button id="back-btn" class="back-btn" aria-label="返回">←</button>
        <div class="song-title">
          <span id="song-emoji" class="big-emoji">⭐</span>
          <h2 id="song-title-en">Song</h2>
          <div id="song-title-zh" class="zh">歌曲</div>
        </div>
      </div>

      <div id="lyrics" class="lyrics"><!-- 歌词行由 JS 渲染 --></div>

      <div class="controls">
        <button id="slow-btn" class="toggle">🐢 慢速</button>
        <button id="play-btn" class="play-btn">
          🎤 <span id="play-label">开始唱 Sing</span>
        </button>
        <button id="loop-btn" class="toggle">🔁 循环</button>
      </div>
      <p class="hint">👂 点任意一句歌词,可以单独再听一遍</p>
    </section>
  </main>

  <!-- ============ 唱完庆祝弹窗 ============ -->
  <div id="celebrate" class="celebrate">
    <div class="panel">
      <div class="big">🎉</div>
      <h3>太棒啦!Great job!</h3>
      <p>你唱完了一整首歌 🎵</p>
      <div id="celebrate-stars" style="font-size: 30px; margin-bottom: 16px;">⭐☆☆</div>
      <button id="celebrate-ok">再来一首 👍</button>
    </div>
  </div>

  <script src="songs.js"></script>
  <script src="app.js"></script>
</body>
</html>
