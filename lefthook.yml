pre-commit:
  commands:
    docs-lint:
      glob: "docs/**/*.md"
      exclude: "docs/reference/**"
      run: make docs-lint
    go-build:
      glob: "**/*.go"
      run: go build ./...
    helm-lint:
      glob: "charts/**"
      run: helm lint charts/karpenter/

commit-msg:
  skip:
    - rebase
    - merge
  commands:
    signed-off-by:
      run: |
        NAME=$(git config user.name)
        EMAIL=$(git config user.email)
        SOB="Signed-off-by: ${NAME} <${EMAIL}>"
        if ! grep -qF "$SOB" {1}; then
          [ -n "$(tail -c1 {1})" ] && echo "" >> {1}
          echo "$SOB" >> {1}
        fi
