version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    # k8s.io/* are transitive deps driven by karpenter-core/controller-runtime;
    # never update them in isolation.
    ignore:
      - dependency-name: "k8s.io/*"
    groups:
      # karpenter upgrades require interface adoption and e2e validation;
      # keep isolated so they don't auto-merge with routine dep bumps.
      karpenter-core:
        applies-to: version-updates
        patterns:
          - "sigs.k8s.io/karpenter"
      go-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "sigs.k8s.io/karpenter"
          - "k8s.io/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
