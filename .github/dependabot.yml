version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    # k8s.io/* are transitive deps driven by karpenter-core/controller-runtime;
    # never update them in isolation.
    ignore:
      - dependency-name: "k8s.io/*"
    groups:
      # karpenter-core and controller-runtime must be updated together and
      # require e2e validation + interface adoption before merging.
      karpenter-core:
        applies-to: version-updates
        patterns:
          - "sigs.k8s.io/karpenter"
          - "sigs.k8s.io/controller-runtime"
      go-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "sigs.k8s.io/karpenter"
          - "sigs.k8s.io/controller-runtime"
          - "k8s.io/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/hack/tools"
    schedule:
      interval: "weekly"
    # Go 1.24 tool directives cause all entries (including tool binaries) to
    # appear as //indirect in go.mod; allow indirect so the group can match them.
    allow:
      - dependency-type: "all"
    groups:
      dev-tools:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/hack/crd-tools"
    schedule:
      interval: "weekly"
    # SECURITY updates only. `allow` also gates security updates, so the
    # previous kubectl-validate-only allowlist silently blocked CVE fixes
    # for every other dependency here (e.g. 13 golang.org/x/crypto
    # advisories). Routine version bumps stay disabled (limit 0): this
    # module's deps (etcd, cel-go, grpc-gateway, ...) are the dependency
    # set matching the pinned k8s.io/* v0.30.x, and bumping them in
    # isolation is likely to break kubectl-validate v0.0.4.
    open-pull-requests-limit: 0
    allow:
      - dependency-type: "all"
    ignore:
      - dependency-name: "k8s.io/*"
    groups:
      crd-tools-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/hack/pdcsi-data"
    schedule:
      interval: "weekly"
    # This module pins the PDCSI repository as a data source for copied
    # node-labeler compatibility data; don't update its transitives alone.
    allow:
      - dependency-name: "sigs.k8s.io/gcp-compute-persistent-disk-csi-driver"
        dependency-type: "all"
    groups:
      pdcsi-data:
        patterns:
          - "sigs.k8s.io/gcp-compute-persistent-disk-csi-driver"
