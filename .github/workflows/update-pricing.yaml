# Pricing data codegen workflow.
#
# Mirrors the approach used by karpenter-provider-aws (.github/workflows/codegen.yaml):
# a scheduled job regenerates embedded pricing data from the cloud provider's
# billing API, commits to a dedicated branch, and opens a PR for review.
#
# Reference: https://github.com/aws/karpenter-provider-aws/blob/main/.github/workflows/codegen.yaml
#
# Required repository configuration:
#   Secret  GCP_PRICING_SA_KEY     — service account key JSON
#   Variable GCP_PRICING_PROJECT   — GCP project ID
#
# A free-tier GCP project is sufficient. Required API services setup:
#   gcloud services enable cloudbilling.googleapis.com compute.googleapis.com
#
# The service account only needs:
#   roles/compute.viewer  — read machine type specs and region list (#218)
name: Update pricing data

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate prices without opening a PR (skips the Create PR step)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_PRICING_SA_KEY }}

      - name: Set GCP project
        run: echo "GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PRICING_PROJECT }}" >> $GITHUB_ENV

      - name: Run price_validate
        id: validate
        continue-on-error: true
        run: |
          mkdir -p /tmp/price-data
          go run ./hack/price_validate \
            --work-dir=/tmp/price-data \
            --no-cache \
            > /tmp/findings.txt 2>&1

      - name: Check for price changes
        id: check-changes
        run: |
          # computed.json is written without saved_at or spot prices, matching the
          # committed seed file format — a plain diff is sufficient.
          if diff -q pkg/providers/pricing/initial-prices.json \
              /tmp/price-data/computed.json > /dev/null 2>&1; then
            echo "No price changes. Nothing to do."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Price data changed — will open a PR."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update initial-prices.json
        if: steps.check-changes.outputs.changed == 'true'
        run: cp /tmp/price-data/computed.json pkg/providers/pricing/initial-prices.json

      - name: Prepare PR body
        if: steps.check-changes.outputs.changed == 'true' && !inputs.dry_run
        run: |
          {
            echo 'Automated refresh of `pkg/providers/pricing/initial-prices.json`'
            echo ''
            echo '## Pricing findings'
            echo ''
            if [ "${{ steps.validate.outcome }}" = "success" ]; then
              echo 'All prices within tolerance — no actionable findings.'
            else
              echo '> ⚠️ **Actionable findings detected.** Review before merging.'
              echo ''
              echo '```'
              cat /tmp/findings.txt
              echo '```'
            fi
          } > /tmp/pr-body.md

      - name: Create PR if pricing changed
        id: create-pr
        if: steps.check-changes.outputs.changed == 'true' && !inputs.dry_run
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore(pricing): update initial-prices.json"
          title: "chore(pricing): scheduled pricing data refresh"
          body-path: /tmp/pr-body.md
          branch: automated/update-pricing
          signoff: true
          sign-commits: true
          delete-branch: true
          labels: pricing,automated

      - name: Post findings check run on PR
        if: ${{ !inputs.dry_run && steps.create-pr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_SHA="${{ steps.create-pr.outputs.pull-request-head-sha }}"

          if [ "${{ steps.validate.outcome }}" = "success" ]; then
            CONCLUSION="success"
            TITLE="No pricing findings"
            SUMMARY="All prices are within tolerance."
          else
            CONCLUSION="failure"
            TITLE="Pricing findings detected"
            SUMMARY="Mismatches, missing, or unknown machines found. See PR body for details."
          fi

          jq -n \
            --arg name "pricing-findings" \
            --arg sha "$HEAD_SHA" \
            --arg conclusion "$CONCLUSION" \
            --arg title "$TITLE" \
            --arg summary "$SUMMARY" \
            '{name:$name,head_sha:$sha,status:"completed",conclusion:$conclusion,output:{title:$title,summary:$summary}}' | \
          gh api repos/${{ github.repository }}/check-runs --method POST --input -
