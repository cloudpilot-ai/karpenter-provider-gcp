name: Docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "proposals/**"
  pull_request:
    paths:
      - "docs/**"
      - "proposals/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install mdox
        run: go install github.com/bwplotka/mdox@v0.9.0

      - name: Lint markdown
        run: make docs-lint
