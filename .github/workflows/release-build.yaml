name: Release image build

on:
  # Trigger on workflow_dispatch (manual trigger)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.0)'
        required: false
  # Trigger on push for new tags
  push:
    tags:
      - '*'

jobs:
  image-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Set tag from inputs or Git tag
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" == "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            echo "No valid trigger for building an image."
            exit 1
          fi
          echo "tag=${TAG}" >> $GITHUB_ENV
          echo "tag_semver=${TAG#v}" >> $GITHUB_ENV
        shell: bash

      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Config env
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_AK }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SK }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-2" >> $GITHUB_ENV

      - name: AWS CLI Init
        uses: unfor19/install-aws-cli-action@v1

      - name: Config ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/cloudpilotai

      - uses: ko-build/setup-ko@v0.6

      - name: build and publish image
        run: |
          export KO_DOCKER_REPO=public.ecr.aws/cloudpilotai/gcp/karpenter
          ko build --bare github.com/cloudpilot-ai/karpenter-provider-gcp/cmd/controller --tags ${{ env.tag }}

  package-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Set tag from inputs or Git tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" == "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            echo "No valid trigger for building a chart."
            exit 1
          fi
          echo "tag=${TAG}" >> $GITHUB_ENV
          echo "tag_semver=${TAG#v}" >> $GITHUB_ENV
        shell: bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch existing Pages index
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          # Fail on any error except 404 (first-ever deployment has no index yet)
          HTTP_CODE=$(curl -sSL -o /tmp/merge-index.yaml -w "%{http_code}" "${PAGES_URL}/index.yaml")
          if [ "${HTTP_CODE}" = "404" ]; then
            rm -f /tmp/merge-index.yaml
            echo "No existing index (first deployment)."
          elif [ "${HTTP_CODE}" != "200" ]; then
            echo "ERROR: Failed to fetch Pages index — HTTP ${HTTP_CODE}. Aborting to avoid losing old chart versions."
            exit 1
          fi

      - name: Package chart
        run: helm package charts/karpenter --version "${{ env.tag_semver }}" --app-version "${{ env.tag }}" -d charts/

      - name: Update Helm repo index
        run: |
          if [ -f /tmp/merge-index.yaml ]; then
            helm repo index charts/ --merge /tmp/merge-index.yaml
          else
            helm repo index charts/
          fi

      - name: Restore previously published chart versions
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          VERSIONS=$(grep '^    version:' /tmp/merge-index.yaml 2>/dev/null | awk '{print $2}')
          [ -z "${VERSIONS}" ] && exit 0

          helm repo add karpenter-gcp "${PAGES_URL}" --force-update
          echo "${VERSIONS}" | while read VERSION; do
            if [ ! -f "charts/karpenter-${VERSION}.tgz" ]; then
              echo "Pulling karpenter ${VERSION}..."
              helm pull karpenter-gcp/karpenter --version "${VERSION}" --destination charts/
            fi
          done

          # Fail rather than deploy an incomplete repo
          EXPECTED=$(echo "${VERSIONS}" | grep -c .)
          ACTUAL=$(ls charts/karpenter-*.tgz 2>/dev/null | wc -l | tr -d ' ')
          if [ "${ACTUAL}" -lt "${EXPECTED}" ]; then
            echo "ERROR: Expected ${EXPECTED} chart versions but only have ${ACTUAL}. Aborting."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: charts/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
