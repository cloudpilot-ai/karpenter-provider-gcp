name: Release image build

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  image-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> $GITHUB_ENV
          echo "tag_semver=${TAG#v}" >> $GITHUB_ENV
        shell: bash

      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Config env
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_AK }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SK }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-2" >> $GITHUB_ENV

      - name: AWS CLI Init
        uses: unfor19/install-aws-cli-action@v1

      - name: Config ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/cloudpilotai

      - uses: ko-build/setup-ko@v0.6

      - name: build and publish image
        run: |
          export KO_DOCKER_REPO=public.ecr.aws/cloudpilotai/gcp/karpenter
          ko build --bare github.com/cloudpilot-ai/karpenter-provider-gcp/cmd/controller --tags ${{ env.tag }}

  package-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Set tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> $GITHUB_ENV
          echo "tag_semver=${TAG#v}" >> $GITHUB_ENV
        shell: bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch existing Pages index
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          # Fail on any error except 404 (first-ever deployment has no index yet)
          HTTP_CODE=$(curl -sSL -o /tmp/merge-index.yaml -w "%{http_code}" "${PAGES_URL}/index.yaml")
          if [ "${HTTP_CODE}" = "404" ]; then
            rm -f /tmp/merge-index.yaml
            echo "No existing index (first deployment)."
          elif [ "${HTTP_CODE}" != "200" ]; then
            echo "ERROR: Failed to fetch Pages index — HTTP ${HTTP_CODE}. Aborting to avoid losing old chart versions."
            exit 1
          fi

      - name: Package charts
        run: |
          helm package charts/karpenter     --version "${{ env.tag_semver }}" --app-version "${{ env.tag }}" -d charts/
          helm package charts/karpenter-crd --version "${{ env.tag_semver }}" --app-version "${{ env.tag }}" -d charts/

      - name: Update Helm repo index
        run: |
          # Old .tgz files are intentionally absent here: --merge only preserves 'created'
          # timestamps for versions NOT found on disk. Running index before restoring old
          # archives ensures historical timestamps are copied from the Pages index as-is.
          if [ -f /tmp/merge-index.yaml ]; then
            helm repo index charts/ --merge /tmp/merge-index.yaml
          else
            helm repo index charts/
          fi

      - name: Restore previously published chart versions
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          [ ! -f /tmp/merge-index.yaml ] && exit 0

          helm repo add karpenter-gcp "${PAGES_URL}" --force-update

          # Parse "chart_name version" pairs from the Helm index YAML using awk.
          # Chart names appear at 2-space indent (e.g. "  karpenter:"); versions at 4-space indent.
          awk '/^  [a-z].*:$/ { chart=$1; sub(/:$/,"",chart) } /^    version:/ { print chart " " $2 }' \
            /tmp/merge-index.yaml > /tmp/chart-versions.txt

          while read CHART VERSION; do
            TARBALL="charts/${CHART}-${VERSION}.tgz"
            if [ ! -f "${TARBALL}" ]; then
              echo "Pulling ${CHART} ${VERSION}..."
              helm pull "karpenter-gcp/${CHART}" --version "${VERSION}" --destination charts/ || \
                echo "WARNING: could not pull ${CHART} ${VERSION}, skipping"
            fi
          done < /tmp/chart-versions.txt

          EXPECTED=$(wc -l < /tmp/chart-versions.txt | tr -d ' ')
          ACTUAL=$(ls charts/karpenter*.tgz 2>/dev/null | wc -l | tr -d ' ')
          if [ "${ACTUAL}" -lt "${EXPECTED}" ]; then
            echo "ERROR: Expected ${EXPECTED} chart archives but only have ${ACTUAL}. Aborting."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: charts/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
