name: Latest image build

on:
  push:
    branches: [ "main" ]

jobs:
  latest-image-build-publish:
    name:  Image publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false

      - name: Config env
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_AK }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SK }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-2" >> $GITHUB_ENV

      - name: AWS CLI Init
        uses: unfor19/install-aws-cli-action@f5b46b7f32cf5e7ebd652656c5036bf83dd1e60c # v1.0.8

      - name: Config ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/cloudpilotai

      - uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10

      - name: build and publish image
        run: |
          export KO_DOCKER_REPO=public.ecr.aws/cloudpilotai/gcp/karpenter
          ko build --bare github.com/cloudpilot-ai/karpenter-provider-gcp/cmd/controller --tags latest
