title: Karpenter Controller
description: Minimal IAM role for the karpenter-provider-gcp controller service account.
stage: GA
includedPermissions:
  # Compute Engine — instance lifecycle
  - compute.instances.create
  - compute.instances.delete
  - compute.instances.get
  - compute.instances.list
  - compute.instances.setLabels
  # Compute Engine — infrastructure discovery
  - compute.disks.create  # implicit: required by Instances.Insert (boot disk)
  - compute.images.get
  - compute.images.list
  - compute.instanceGroupManagers.get
  - compute.machineTypes.list
  - compute.networks.get
  - compute.projects.get
  - compute.regionInstanceTemplates.get
  - compute.regionInstanceTemplates.list
  - compute.regions.get
  - compute.subnetworks.get
  - compute.subnetworks.use
  - compute.zones.list
  - compute.zoneOperations.get
  # GKE Container Engine — cluster config and node pool templates
  - container.clusters.get
  - container.nodePools.create
  - container.nodePools.get
